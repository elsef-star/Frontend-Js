<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
   <div class="elf-order-form">
        <h1>Simple Order Form</h1>
        <p class="subtitle">Please fill out the form below to place your order.</p>

        <form id="orderForm">
            <label class="form-label">Product</label>
            <select class="input-field" id="product" required>
                <option value="" disabled selected>Select a product you want to order</option>
                <option value="product1">Product 1</option>
                <option value="product2">Product 2</option>
                <option value="product3">Product 3</option>
            </select>
            <input type="number" class="input-field" id="quantity" placeholder="Quantity" min="1" required>
            <input type="date" class="input-field" id="deliveryDate" required>
            <label class="form-label">Delivery Time</label>
            <div class="checkbox-grid">
                <label class="checkbox-item">
                    <input type="checkbox" name="deliveryTime" value="9:00 AM - 11:00 AM"> 9:00 AM - 11:00 AM
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="deliveryTime" value="11:00 AM - 1:00 PM"> 11:00 AM - 1:00 PM
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="deliveryTime" value="1:00 PM - 3:00 PM"> 1:00 PM - 3:00 PM
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="deliveryTime" value="3:00 PM - 5:00 PM"> 3:00 PM - 5:00 PM
                </label>
            </div>
            <label class="form-label"></label> 
            <input type="text" class="input-field" id="customerName" placeholder="Name" required>

            <div class="form-row">
                <input type="email" class="input-field" id="customerEmail" placeholder="Email" required>
                <input type="tel" class="input-field" id="customerPhone" placeholder="Phone" required>
            </div>

            <textarea class="input-field" id="comments" rows="4" placeholder="Additional Comments" style="resize: vertical;"></textarea>

            <label class="terms-container">
                <input type="checkbox" id="terms" required> I accept the terms and conditions.
            </label>

            <div class="btn-container">
                <button type="submit" class="submit-btn">Place Order</button>
            </div>
        </form>
    </div>
    <script src="task.js"></script>
    
</body>
</html>
